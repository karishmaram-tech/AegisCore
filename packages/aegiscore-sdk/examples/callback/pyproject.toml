[project]
name = "aegiscore-example-callback"
version = "0.0.1"
description = "Aegiscore plugin scaffolded by aegiscore-sdk."
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.13"

dependencies = [
    "aegiscore-sdk",
]

[project.entry-points."aegiscore.callbacks"]
aegiscore_example_callback = "aegiscore_example_callback"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/aegiscore_example_callback"]
