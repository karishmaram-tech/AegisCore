rules:
  # ─── Sandbox isolation invariants ────────────────────────────────────
  - id: aegiscore-no-shell-true-outside-sandbox
    severity: ERROR
    message: |
      subprocess with shell=True outside sandbox_kernel/ is a command-injection
      vector. The sandbox kernel is the only allowlisted home for shell=True;
      every other Python file that wants to invoke a subcommand must build the
      argv list explicitly.
    languages: [python]
    patterns:
      - pattern-either:
          - pattern: subprocess.run(..., shell=True, ...)
          - pattern: subprocess.call(..., shell=True, ...)
          - pattern: subprocess.check_output(..., shell=True, ...)
          - pattern: subprocess.check_call(..., shell=True, ...)
          - pattern: subprocess.Popen(..., shell=True, ...)
          - pattern: os.system(...)
          - pattern: os.popen(...)
    paths:
      exclude:
        - "**/sandbox_kernel/**"
        - "**/tests/**"

  # ─── Type-safety escape hatches ──────────────────────────────────────
  - id: aegiscore-no-blanket-type-ignore
    severity: WARNING
    message: |
      Bare `# type: ignore` or `# pyright: ignore` without a rule code disables
      every check on the line. Use scoped suppressions:
        # type: ignore[<error-code>]   OR   # pyright: ignore[reportXxx]
      so unrelated future errors on the line still surface.
    languages: [python]
    patterns:
      - pattern-regex: '#\s*(type:\s*ignore|pyright:\s*ignore)(?![\[(])'
    paths:
      exclude:
        - "**/tests/**"

  # ─── Cryptographic agility ───────────────────────────────────────────
  - id: aegiscore-no-weak-hash
    severity: WARNING
    message: |
      MD5 and SHA-1 are broken for cryptographic use. If you need a non-crypto
      content hash (e.g. cache keys), pass `usedforsecurity=False` explicitly so
      the intent is documented at the call site.
    languages: [python]
    patterns:
      - pattern-either:
          - pattern: hashlib.md5(...)
          - pattern: hashlib.sha1(...)
      - pattern-not: hashlib.md5(..., usedforsecurity=False)
      - pattern-not: hashlib.sha1(..., usedforsecurity=False)

  # ─── HTTP request hygiene ────────────────────────────────────────────
  - id: aegiscore-no-verify-false
    severity: ERROR
    message: |
      Passing verify=False to requests/httpx disables TLS certificate
      verification, which CWE-295 (improper certificate validation). The
      sandbox MAY need this for self-signed targets — in which case it must
      go through `aegiscore.tools.web` with the engagement RoE attached.
    languages: [python]
    patterns:
      - pattern-either:
          - pattern: requests.$METHOD(..., verify=False, ...)
          - pattern: httpx.$METHOD(..., verify=False, ...)
          - pattern: requests.Session(...).$METHOD(..., verify=False, ...)
          - pattern: httpx.Client(..., verify=False, ...)
    paths:
      exclude:
        - "**/tests/**"
        - "**/aegiscore/tools/web/**"
        - "**/aegiscore/tools/proxy/**"

  # ─── No raw API keys in the repo ─────────────────────────────────────
  - id: aegiscore-no-hardcoded-default-key
    severity: ERROR
    message: |
      The LiteLLM publicly-documented default key `sk-aegiscore-master` must
      not be a fallback. Any code that reads LITELLM_API_KEY must fail loud if
      it's unset, never quietly accept the public key.
    languages: [python, ts, javascript]
    patterns:
      - pattern-regex: 'sk-aegiscore-master'
      - pattern-not-regex: 'nosemgrep: aegiscore-no-hardcoded-default-key'
    paths:
      exclude:
        - "**/tests/**"
        - "benchmark/**"
        - ".env.example"
        - "**/litellm_startup.py"
        - "packages/aegiscore-core/aegiscore_core/types/llm.py"
        - "packages/aegiscore-core/aegiscore_core/utils/config.py"

  # ─── No assert in production code ────────────────────────────────────
  - id: aegiscore-no-assert-in-prod
    severity: WARNING
    message: |
      Python -O strips assertions. Production code that relies on assert for
      validation will behave differently under PYTHONOPTIMIZE=1. Use explicit
      `if ... raise ValueError(...)` for runtime contract checks.
    languages: [python]
    patterns:
      - pattern: assert $X
    paths:
      include:
        - "**/aegiscore/middleware/**"
        - "**/aegiscore/tools/**"
        - "**/aegiscore/sandbox_kernel/**"
        - "**/aegiscore/sandbox_server/**"
        - "**/aegiscore/runtime/**"
      exclude:
        - "**/tests/**"
